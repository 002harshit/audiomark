name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - riscv/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake autotools-dev curl python3 python3-pip libmpc-dev libmpfr-dev libgmp-dev gawk build-essential bison flex texinfo gperf libtool patchutils bc zlib1g-dev libexpat-dev ninja-build cmake libglib2.0-dev

      - name: Cache XuanTie RISC-V Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/opt/riscv
          key: xuantie-gnu-toolchain-llvm-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Compile XuanTie GNU+Clang Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/XUANTIE-RV/xuantie-gnu-toolchain.git
          cd xuantie-gnu-toolchain
          
          # Force the XuanTie toolchain and libraries to target xtheadvector natively
          ./configure --prefix=${{ github.workspace }}/opt/riscv \
            --with-arch=rv64gc_xtheadvector \
            --with-abi=lp64d \
            --enable-llvm
            
          make linux -j $(nproc)

      - name: Add Toolchain to PATH
        run: echo "${{ github.workspace }}/opt/riscv/bin" >> $GITHUB_PATH

      - name: Post-Build Diagnostics (Compiler & CPU Info)
        run: |
          echo "=== CPU Info ==="
          cat /proc/cpuinfo
          
          echo "=== Clang Version ==="
          riscv64-unknown-linux-gnu-clang --version
          
          echo "=== Vector Macros Dump (-march=rv64gcbv) ==="
          riscv64-unknown-linux-gnu-clang -march=rv64gcbv -mabi=lp64d -dM -E - < /dev/null | grep -E "riscv_v|vector" || echo "No matches for rv64gcbv"
          
          echo "=== Vector Macros Dump (-march=rv64gc_xtheadvector) ==="
          riscv64-unknown-linux-gnu-clang -march=rv64gc_xtheadvector -mabi=lp64d -dM -E - < /dev/null | grep -E "riscv_v|vector" || echo "No matches for xtheadvector"

      - name: Configure CMake for RVV 0.7.1
        env:
          CC: riscv64-unknown-linux-gnu-clang
          CXX: riscv64-unknown-linux-gnu-clang++
        run: >
          cmake -S . -B build 
          -DPORT_DIR=ports/riscv 
          -DCMAKE_C_FLAGS="-O3 -march=rv64gc_xtheadvector -mabi=lp64d" 
          -DCMAKE_CXX_FLAGS="-O3 -march=rv64gc_xtheadvector -mabi=lp64d"

      - name: Build
        run: cmake --build build --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  unit-tests:
    needs: build
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Pre-Test Diagnostics (CPU Info)
        run: |
          echo "=== CPU Info on Test Node ==="
          cat /proc/cpuinfo

      - name: Make test binaries executable
        run: chmod +x build/test_*

      - name: Run unit tests
        run: |
          set -x
          ./build/test_abf_f32
          ./build/test_aec_f32
          ./build/test_anr_f32
          ./build/test_kws
          ./build/test_mfcc_f32

  benchmark:
    needs: build
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Make benchmark executable
        run: chmod +x build/audiomark

      - name: Pre-Benchmark Diagnostics (CPU Info)
        run: |
          echo "=== CPU Info on Benchmark Node ==="
          cat /proc/cpuinfo

      - name: Run AudioMark benchmark
        timeout-minutes: 15
        run: ./build/audiomark 2>&1 | tee audiomark_output.txt

      - name: Report AudioMark score
        if: always()
        run: if [ -f audiomark_output.txt ]; then cat audiomark_output.txt; else echo "Benchmark did not run."; fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audiomark-results
          path: audiomark_output.txt
          retention-days: 30
